services:
  # 유저 앱 (포트 3300)
  sovereign-sms-user:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-sms-user
    restart: unless-stopped
    ports:
      - "0.0.0.0:3300:3000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sovereign-sms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 관리자 앱 (포트 3301)
  sovereign-sms-admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: sovereign-sms-admin
    restart: unless-stopped
    ports:
      - "0.0.0.0:3301:3001"
    env_file: .env
    # FORCE_SECURE_COOKIE 제거됨 — HTTPS 환경에서 secure=true 자동 적용
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sovereign-sms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SMPP 워커 — TXG 메인 발송 라인 (단일 인스턴스 강제, 다중 바인드 = 계정 정지)
  sovereign-sms-smpp-worker:
    build:
      context: .
      dockerfile: services/smpp-worker/Dockerfile
    container_name: sovereign-sms-smpp-worker
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sovereign-sms-net
    deploy:
      replicas: 1
    # 외부 SMPP 서버로 outbound TCP만 사용 — 인바운드 포트 노출 불필요
    # (deliver_sm DLR도 같은 outbound 연결로 수신)

networks:
  sovereign-sms-net:
    name: sovereign-sms-net
    driver: bridge
